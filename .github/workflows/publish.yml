name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/instructional-agents
    permissions:
      id-token: write   # Required for PyPI Trusted Publishing (OIDC)
      contents: write   # Required to create GitHub Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(python -c "import ast,sys; tree=ast.parse(open('src/__init__.py').read()); \
            print(next(n.value.value for n in tree.body if isinstance(n, ast.Assign) \
            and n.targets[0].id == '__version__'))")
          echo "Tag: $TAG | Version: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match src/__init__.py version $VERSION"
            exit 1
          fi

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
